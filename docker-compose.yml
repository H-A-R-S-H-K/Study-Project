# Village Transport Connect — full stack for a single-host deployment.
#   docker compose up -d --build
# Then seed the admin:  docker compose exec api npm run seed
services:
  mongo:
    image: mongo:6
    restart: unless-stopped
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ['CMD', 'mongosh', '--quiet', '--eval', "db.runCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: ./backend
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: '5000'
      API_PREFIX: /api/v1
      MONGO_URI: mongodb://mongo:27017/village_transport_connect
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:8080}
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME:-}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY:-}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET:-}
      SMS_PROVIDER_KEY: ${SMS_PROVIDER_KEY:-}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@vtc.local}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin12345}
    ports:
      - '5000:5000'
    healthcheck:
      test: ['CMD', 'curl', '-fsS', 'http://localhost:5000/api/v1/health']
      interval: 15s
      timeout: 5s
      retries: 5

  admin:
    build: ./admin
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - '8080:80'

volumes:
  mongo-data:
