name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    name: Backend — typecheck, test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - working-directory: backend
        run: npm ci
      - working-directory: backend
        run: npm run typecheck
      - working-directory: backend
        run: npm run lint
      - working-directory: backend
        run: npm test
      - working-directory: backend
        run: npm run build

  mobile:
    name: Mobile — typecheck, test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: mobile/package-lock.json
      - working-directory: mobile
        run: npm ci --ignore-scripts
      # keys.local.ts holds the API key and is gitignored, so it's absent in CI.
      # Create the empty stub from the example so typecheck/build can resolve it.
      - working-directory: mobile
        run: cp src/config/keys.local.example.ts src/config/keys.local.ts
      - working-directory: mobile
        run: npm run typecheck
      - working-directory: mobile
        run: npm test

  admin:
    name: Admin — typecheck, build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: admin/package-lock.json
      - working-directory: admin
        run: npm ci
      - working-directory: admin
        run: npm run typecheck
      - working-directory: admin
        run: npm run build
